---
# Airflow Helm Chart - Core Components Only

defaultAirflowRepository: apache/airflow
defaultAirflowTag: "2.9.2"
airflowVersion: "2.9.2"

uid: 50000
gid: 0

executor: "CeleryExecutor"

rbac:
  create: true
  createSCCRoleBinding: false

# Images
images:
  airflow:
    repository: ~
    tag: ~
    pullPolicy: IfNotPresent
  statsd:
    repository: quay.io/prometheus/statsd-exporter
    tag: v0.26.1
    pullPolicy: IfNotPresent
  redis:
    repository: redis
    tag: 7.2-bookworm
    pullPolicy: IfNotPresent

# Database connection
data:
  metadataConnection:
    user: postgres
    pass: postgres
    protocol: postgresql
    host: ~
    port: 5432
    db: postgres
    sslmode: disable

# Scheduler
scheduler:
  enabled: true
  replicas: 1
  args: ["bash", "-c", "exec airflow scheduler"]
  logGroomerSidecar:
    enabled: true
    retentionDays: 15
  waitForMigrations:
    enabled: true

# Webserver
webserver:
  enabled: true
  replicas: 1
  args: ["bash", "-c", "exec airflow webserver"]
  defaultUser:
    enabled: true
    role: Admin
    username: admin
    email: admin@example.com
    firstName: admin
    lastName: user
    password: admin
  service:
    type: ClusterIP
    ports:
      - name: airflow-ui
        port: "{{ .Values.ports.airflowUI }}"
  waitForMigrations:
    enabled: true

# Celery Workers
workers:
  replicas: 1
  args:
    - "bash"
    - "-c"
    - "exec airflow celery worker"
  persistence:
    enabled: true
    size: 100Gi
  logGroomerSidecar:
    enabled: true
    retentionDays: 15
  waitForMigrations:
    enabled: true
  terminationGracePeriodSeconds: 600

# Triggerer
triggerer:
  enabled: true
  replicas: 1
  args: ["bash", "-c", "exec airflow triggerer"]
  persistence:
    enabled: true
    size: 100Gi
  logGroomerSidecar:
    enabled: true
    retentionDays: 15
  waitForMigrations:
    enabled: true
  terminationGracePeriodSeconds: 60

# DB migration job (runs on install/upgrade)
migrateDatabaseJob:
  enabled: true
  ttlSecondsAfterFinished: 300

# Admin user creation job (runs on install)
createUserJob:
  ttlSecondsAfterFinished: 300

# StatsD - metrics exporter
statsd:
  enabled: true

# Redis - Celery task broker
redis:
  enabled: true
  persistence:
    enabled: true
    size: 1Gi

# PostgreSQL - metadata DB (not recommended for production)
postgresql:
  enabled: true
  auth:
    enablePostgresUser: true
    postgresPassword: postgres
    username: ""
    password: ""

# Port definitions
ports:
  airflowUI: 8080
  workerLogs: 8793
  triggererLogs: 8794
  redisDB: 6379
  statsdIngest: 9125
  statsdScrape: 9102
  flowerUI: 5555

# Airflow config (mounted as airflow.cfg)
config:
  core:
    dags_folder: '{{ include "airflow_dags" . }}'
    load_examples: 'False'
    executor: '{{ .Values.executor }}'
    colored_console_log: 'False'
    remote_logging: 'False'
  logging:
    remote_logging: 'False'
    colored_console_log: 'False'
  metrics:
    statsd_on: 'True'
    statsd_port: 9125
    statsd_prefix: airflow
    statsd_host: '{{ printf "%s-statsd" (include "airflow.fullname" .) }}'
  webserver:
    enable_proxy_fix: 'True'
  celery:
    worker_concurrency: 16
  scheduler:
    standalone_dag_processor: 'False'
    statsd_on: 'True'
    statsd_port: 9125
    statsd_prefix: airflow
    statsd_host: '{{ printf "%s-statsd" (include "airflow.fullname" .) }}'
  kubernetes_executor:
    namespace: '{{ .Release.Namespace }}'
    pod_template_file: '{{ include "airflow_pod_template_file" . }}/pod_template_file.yaml'
    worker_container_repository: '{{ .Values.images.airflow.repository | default .Values.defaultAirflowRepository }}'
    worker_container_tag: '{{ .Values.images.airflow.tag | default .Values.defaultAirflowTag }}'
    multi_namespace_mode: 'False'
  triggerer:
    default_capacity: 1000

# DAGs - disabled by default (mount your own volume or use gitSync)
dags:
  persistence:
    enabled: false
  gitSync:
    enabled: false

# Logs - disabled persistent volume by default
logs:
  persistence:
    enabled: false
