version: "3.8"
services:
  postgres:
    image: postgres:14
    container_name: local_pgdb
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - local_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      retries: 5

  flyway:
    image: flyway/flyway:10
    container_name: flyway_migrations
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./migrations:/flyway/sql
    command: >
      -url=jdbc:postgresql://postgres:5432/${POSTGRES_DB}
      -user=${POSTGRES_USER}
      -password=${POSTGRES_PASSWORD}
      -connectRetries=5
      migrate

  flyway-cust1:
    image: flyway/flyway:10
    container_name: flyway_cust1
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./migrations:/flyway/sql
    command: >
      -url=jdbc:postgresql://postgres:5432/${CUST1_DB}
      -user=${CUST1_USER}
      -password=${CUST1_PASSWORD}
      -connectRetries=5
      migrate

  flyway-cust2:
    image: flyway/flyway:10
    container_name: flyway_cust2
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./migrations:/flyway/sql
    command: >
      -url=jdbc:postgresql://postgres:5432/${CUST2_DB}
      -user=${CUST2_USER}
      -password=${CUST2_PASSWORD}
      -connectRetries=5
      migrate

  pgadmin:
    image: dpage/pgadmin4
    container_name: pgadmin4_container
    depends_on:
      - postgres
    ports:
      - "8888:80"
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD}
    volumes:
      - pgadmin-data:/var/lib/pgadmin

volumes:
  local_pgdata:
  pgadmin-data:
